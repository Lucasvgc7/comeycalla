<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Come y Calla</title>
    <style>
        /* Reseteo básico para evitar espacios extra en móviles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Fondo con un toque más moderno */
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
        }

        .card {
            text-align: center;
            width: 100%;
            max-width: 500px; /* Evita que en tablets se vea gigante */
        }

        h1 {
            /* Usamos 'vw' para que el texto escale con el ancho de la pantalla */
            font-size: clamp(2rem, 8vw, 3.5rem); 
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1;
        }

        .img-wrapper {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        img {
            width: 100%;
            height: auto;
            display: block; /* Quita espacios vacíos debajo de la imagen */
            transition: transform 0.3s ease;
        }

        /* Pequeño efecto interactivo para cuando toquen la imagen en el cel */
        img:active {
            transform: scale(0.95);
        }

    </style>
</head>
<body>

    <div class="card">
        <h1>COME Y CALLA</h1>
        <div class="img-wrapper">
            <!-- Cambia esta URL por la de tu imagen preferida -->
            <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1000" alt="Comida">
        </div>
    </div>

</body>
</html>
